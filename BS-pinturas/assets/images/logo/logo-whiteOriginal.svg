  <!-- Texto PINTURAS branco -->
  <text x="62" y="38" text-anchor="start" font-family="Arial Narrow, sans-serif" font-size="30" font-weight="700" fill="#FFFFFF" letter-spacing="1">PINTURAS</text>

  <!-- Subtítulo branco suave -->
  <text x="63" y="54" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#AAAAAA">Eletrostática, Líquida e Jateamento</text>


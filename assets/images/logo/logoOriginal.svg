<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img">
  <title>BS Pinturas - Eletrostática, Líquida e Jateamento</title>
  <desc>Logo oficial BS Pinturas</desc>

  <!-- Fundo branco arredondado -->
  <rect x="0" y="0" width="320" height="80" fill="#FFFFFF" rx="6"/>

  <!-- Ícone BS vermelho -->
  <rect x="8" y="8" width="52" height="52" fill="#CC1111" rx="8"/>
  <text x="34" y="45" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="24" font-weight="900" fill="#FFFFFF">BS</text>

  <!-- Texto PINTURAS -->
  <text x="70" y="42" text-anchor="start" font-family="Arial Narrow, sans-serif" font-size="30" font-weight="700" fill="#CC1111" letter-spacing="1">PINTURAS</text>

  <!-- Subtítulo -->
  <text x="71" y="57" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#555555">Eletrostática, Líquida e Jateamento</text>

</svg>
